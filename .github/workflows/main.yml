name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Install Desktop + XRDP
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xfce4 xfce4-goodies xrdp dbus-x11

          sudo systemctl enable xrdp
          sudo systemctl start xrdp

          echo "startxfce4" | sudo tee /etc/skel/.xsession
          echo "startxfce4" > ~/.xsession

      - name: Create RDP User with Secure Password
        run: |
          PASSWORD=$(tr -dc 'A-Za-z0-9!@#$%^&*' < /dev/urandom | head -c 16)

          if id "rdpuser" &>/dev/null; then
            sudo userdel -r rdpuser 2>/dev/null || true
          fi

          sudo useradd -m -s /bin/bash rdpuser
          echo "rdpuser:${PASSWORD}" | sudo chpasswd
          sudo usermod -aG sudo rdpuser

          echo "startxfce4" | sudo tee /home/rdpuser/.xsession
          sudo chown rdpuser:rdpuser /home/rdpuser/.xsession

          printf 'RDP_USER=rdpuser\n' >> "$GITHUB_ENV"
          printf 'RDP_PASS=%s\n' "$PASSWORD" >> "$GITHUB_ENV"

      - name: Configure XRDP
        run: |
          sudo sed -i 's/^security_layer=.*/security_layer=rdp/' /etc/xrdp/xrdp.ini
          sudo sed -i 's/^crypt_level=.*/crypt_level=none/' /etc/xrdp/xrdp.ini

          sudo systemctl restart xrdp

          sleep 3
          ss -tlnp | grep 3389 || { echo "xrdp not listening on 3389"; exit 1; }

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Establish Tailscale Connection
        run: |
          sudo tailscale up \
            --authkey="tskey-auth-kX4YXSjvP721CNTRL-V5uvfGrk9he7orzXJyMZge6w8Qu2o8z9P" \
            --hostname="gh-runner-${GITHUB_RUN_ID}"

          TS_IP=""
          for i in $(seq 1 12); do
            TS_IP=$(tailscale ip -4 2>/dev/null | head -1 | tr -d '[:space:]')
            [ -n "$TS_IP" ] && break
            sleep 5
          done

          if [ -z "$TS_IP" ]; then
            echo "Tailscale IP not assigned. Exiting."
            exit 1
          fi

          printf 'TAILSCALE_IP=%s\n' "$TS_IP" >> "$GITHUB_ENV"
          echo "Tailscale IPv4: $TS_IP"

          {
            echo "## RDP + Tailscale"
            echo "- Tailscale IP: **$TS_IP**"
            echo "- RDP User: **$RDP_USER**"
            echo "- RDP Pass: **$RDP_PASS**"
            echo "- Port: **3389/TCP**"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Sanity Check
        run: |
          tailscale status
          ss -tlnp | grep 3389
          echo "Connect via RDP to: ${TAILSCALE_IP}:3389"

      - name: Keep runner alive
        run: sleep 21600
